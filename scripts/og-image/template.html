<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
FONTS_PLACEHOLDER
<link rel="stylesheet" href="../../site/static/css/main.css">
<style>
  html, body {
    width: 1200px;
    height: 630px;
    background: var(--parchment);
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    display: flex;
    align-items: center;
    /* Same logo:gap ratio as .brand (12px : 56px logo) in main.css, scaled
       up to this card's much larger logo. */
    gap: 38px;
  }
  .logo {
    width: 180px;
    height: 180px;
  }
  /* .brand__text and .hero__heading carry the right font/color/weight from
     main.css, but their real font-sizes are scoped to the nav bar and the
     cqw-based hero clamp - neither applies in this standalone card, so size
     them for this layout specifically. */
  .name.brand__text {
    font-size: 54px;
    white-space: nowrap;
  }
  .tag.hero__heading {
    font-size: 46px;
    white-space: nowrap;
    margin-bottom: 0;
  }
  /* The logo's signature-style tail extends below its ring, so the ring's
     visual center sits above the image's geometric center - nudge the text
     up to align with the ring, not the full bounding box. */
  .text-block {
    margin-top: -10px;
  }
</style>
</head>
<body>
  <div class="card">
    <img class="logo" src="../../site/static/images/logo_dark.svg">
    <div class="text-block">
      <div class="name brand__text">Ontario Menopause Clinic</div>
      <div class="tag hero__heading"><em>For the whole you.</em></div>
    </div>
  </div>
</body>
</html>
