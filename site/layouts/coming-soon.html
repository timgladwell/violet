<!DOCTYPE html>
<html lang="{{ .Site.Language.LanguageCode | default "en-ca" }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">

  <title>Coming Soon</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/main.css">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--sand-light);
      font-family: var(--serif);
    }

    .coming-soon {
      text-align: center;
      padding: var(--s-8);
      max-width: 560px;
    }

    .coming-soon__heading {
      font-family: var(--font-serif);
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 300;
      color: var(--black);
      line-height: 1.15;
      margin-bottom: var(--s-6);
    }

    .coming-soon__rule {
      width: 40px;
      height: 1px;
      background-color: var(--pink-mid);
      margin: var(--s-8) auto;
    }
  </style>
</head>
<body>
  <main class="coming-soon" aria-label="Coming soon">
    <div class="coming-soon__rule" role="presentation"></div>
    <h1 class="coming-soon__heading">We&rsquo;re&nbsp;almost&nbsp;ready.</h1>
    <div class="coming-soon__rule" role="presentation"></div>
  </main>
</body>
</html>
