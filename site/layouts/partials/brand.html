{{/* params: variant ("full" | "compact"), theme ("dark" | "light") */}}

  <span class="brand__text">
    Ontario Menopause Clinic
    {{ if eq .variant "full" }}<span class="brand__tag">Expert Menopause Care</span>{{ end }}
  </span>
</span>
