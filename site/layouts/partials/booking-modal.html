<div class="booking-modal" id="booking-modal" role="dialog" aria-modal="true" aria-label="Book an Appointment" data-booking-url="{{ .Site.Params.bookingURL }}" hidden>
  <div class="booking-modal__backdrop"></div>
  <div class="booking-modal__wrap">
    <button class="booking-modal__close" aria-label="Dismiss booking form">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
    <div class="booking-modal__panel">
      <iframe class="booking-modal__frame" title="Book an Appointment"></iframe>
    </div>
  </div>
</div>
