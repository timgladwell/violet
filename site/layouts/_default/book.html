{{ define "main" }}
<main>

  <section class="page-hero">
    <div class="container">
      <span class="page-hero__eyebrow">Book</span>
      <h1 class="page-hero__heading">{{ .Title }}</h1>
      {{ with .Description }}
      <p class="page-hero__lead">{{ . }}</p>
      {{ end }}
    </div>
  </section>

  <section class="section">
    <div class="container">
      <iframe class="book-page__frame" title="Book an Appointment" src="{{ .Site.Params.bookingURL | default "#" }}"></iframe>
    </div>
  </section>

</main>
{{ end }}
