{{ define "main" }}
<main>
  <section class="page-hero">
    <div class="container">
      <h1 class="page-hero__heading">{{ .Title }}</h1>
      {{ with .Description }}
      <p class="page-hero__lead">{{ . }}</p>
      {{ end }}
    </div>
  </section>
  <section class="section">
    <div class="container container--narrow prose">
      {{ .Content }}
    </div>
  </section>
</main>
{{ end }}
