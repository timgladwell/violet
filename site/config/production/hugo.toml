# Production default: maintenance placeholder is on (see baseof.html, which
# swaps in the placeholder for every route whenever params.maintenanceMode is
# true) so nothing is reachable until launch.
#
# To launch: set params.maintenanceMode = false below. Flip it back to true
# any time the site needs to come down (incident, planned downtime, etc).
disableKinds = ['taxonomy', 'term']

# Enable when ready to launch
enableRobotsTXT = false

[params]
    maintenanceMode = true
