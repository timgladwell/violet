baseURL = 'https://ontariomenopauseclinic.ca/'
title = 'Ontario Menopause Clinic'

[languages]
[languages.en]
locale = 'en-CA'

# disableKinds is set per-environment (config/<environment>/hugo.toml) since
# Hugo doesn't merge top-level array values from environment overrides.

enableRobotsTXT = false

[params]
  description = 'Expert menopause care in Ontario. Certified menopause practitioner. No referral needed — book online today.'
  bookingURL = ''           # Set via HUGO_PARAMS_BOOKINGURL env var — see .env.local.example
  infoContactEmail = ''     # Set via HUGO_PARAMS_INFOCONTACTEMAIL env var — see .env.local.example
  privacyContactEmail = ''  # Set via HUGO_PARAMS_PRIVACYCONTACTEMAIL env var — see .env.local.example

  comingSoon = false        # Display the "Coming soon" page
  isStaging = false         # Display the "Staging environment" banner

[sitemap]
  changefreq = 'monthly'
  priority = 0.5
