name: Check Environments

on:
  pull_request:

permissions:
  contents: read

jobs:
  check-environments:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.3

      - name: Load env defaults from .env.local.example
        run: grep -v '^#' .env.local.example | grep -v '^$' >> $GITHUB_ENV

      - name: Read Hugo version
        id: hugo-version
        run: echo "version=$(grep '^hugo ' .tool-versions | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ steps.hugo-version.outputs.version }}
          extended: true

      - name: Check environments
        run: ./check-environments.sh
