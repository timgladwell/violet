name: Check Environments

on:
  pull_request:

permissions:
  contents: read

jobs:
  check-environments:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.3

      - name: Load env defaults from .env.local.example
        run: grep -v '^#' .env.local.example | grep -v '^$' >> $GITHUB_ENV

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.160.0'
          extended: true

      - name: Check environments
        run: ./check-environments.sh
